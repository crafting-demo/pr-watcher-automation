overview: |
  PR-watcher automation template.

  A single long-running workspace that runs a cron job every 5 minutes. The job
  authenticates to GitHub with the sandbox owner's personal token, lists open
  PRs on the target repo, and for each newly-seen PR runs a placeholder
  execution block. Seen PR numbers are persisted at
  ~/pr-watcher/state/seen-prs.txt so the same PR is never acted on twice.

  Instructions for the Crafting Assistant
  ---------------------------------------
  When a user asks to "run something every time a PR is opened on repo X"
  (or any variant — "watch PRs on ...", "trigger on new PR to ...", etc.),
  use this template. Before calling `cs sandbox create`, you MUST:

  1. Prompt the user for the GitHub repository to watch, and parse it into:
       - TARGET_GITHUB_ORG   (the org or user that owns the repo)
       - TARGET_GITHUB_REPO  (the repo name)
     Accept either "owner/repo" shorthand or a full GitHub URL and extract
     the two parts yourself — do not make the user type them separately.

  2. Confirm that the user has a user-private secret named `github-token`
     in the current org. If it is missing, ask the user to create it in
     the Crafting Web Console before you proceed:

       Resources → Secrets → Private Secrets → Create Secret
       Name: github-token
       Content: paste the GitHub PAT

     The PAT only needs fine-grained `Pull requests: Read` on the target
     repo (or classic `public_repo` / `repo`). Mention this to the user
     when asking them to create it. Do not attempt to create the secret
     on the user's behalf — the token is personal and must be entered by
     the user themselves.

  3. Create the sandbox with private access so the private secret mounts:
         cs sandbox create <name> \
             --from def:sandbox.yaml \
             --access=private \
             -E TARGET_GITHUB_ORG=<org> \
             -E TARGET_GITHUB_REPO=<repo>

  4. Replace `scripts/on-new-pr.sh` with the real per-PR action the user
     actually asked for. The placeholder in this template only prints —
     it is NOT the finished automation.

env:
  - TARGET_GITHUB_ORG=REPLACE_ME
  - TARGET_GITHUB_REPO=REPLACE_ME
  - PR_WATCHER_HOME=/home/owner/pr-watcher
  - PR_WATCHER_STATE_FILE=/home/owner/pr-watcher/state/seen-prs.txt
  - GITHUB_TOKEN=${secret:github-token}

workspaces:
  - name: pr-watcher
    # base_snapshot intentionally omitted: the org's default_base_image
    # (or the cluster default) is used. All stock Crafting shared workspace
    # bases are Debian-family, so the `build` hook's apt-get flow works.
    checkouts:
      - path: pr-watcher
        repo:
          git: https://github.com/crafting-demo/pr-watcher-automation
        version_spec: master
        history:
          depth: 1
        manifest:
          overlays:
            - inline:
                hooks:
                  post-checkout:
                    cmd: |
                      set -euo pipefail
                      mkdir -p "${PR_WATCHER_HOME}/state" "${PR_WATCHER_HOME}/logs"
                      touch "${PR_WATCHER_STATE_FILE}"
                      cp -f scripts/watch-prs.sh "${PR_WATCHER_HOME}/watch-prs.sh"
                      cp -f scripts/on-new-pr.sh "${PR_WATCHER_HOME}/on-new-pr.sh"
                      chmod +x "${PR_WATCHER_HOME}/watch-prs.sh" "${PR_WATCHER_HOME}/on-new-pr.sh"
                  build:
                    cmd: |
                      set -euo pipefail
                      if ! command -v gh >/dev/null 2>&1; then
                        sudo install -m 0755 -d /etc/apt/keyrings
                        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                          | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
                        sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
                        arch="$(dpkg --print-architecture)"
                        echo "deb [arch=${arch} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                          | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
                        sudo apt-get update -qq
                        sudo apt-get install -y -qq --no-install-recommends gh ca-certificates
                      fi
                jobs:
                  watch-prs:
                    run:
                      cmd: |
                        "${PR_WATCHER_HOME}/watch-prs.sh" \
                          >> "${PR_WATCHER_HOME}/logs/watch-prs.log" 2>&1
                    schedule: "*/5 * * * *"
                    disable_on_start: false
