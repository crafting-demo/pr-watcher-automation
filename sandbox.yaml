overview: |
  PR-watcher automation template.

  A single long-running workspace that runs a cron job every 5 minutes. The job
  requests a short-lived GitHub App installation token for the target repo,
  lists open PRs on that repo, and for each newly-seen PR runs a placeholder
  execution block. Seen PR numbers are persisted at
  ~/pr-watcher/state/seen-prs.txt so the same PR is never acted on twice.

  Instructions for the Crafting Assistant
  ---------------------------------------
  When a user asks to "run something every time a PR is opened on repo X"
  (or any variant — "watch PRs on ...", "trigger on new PR to ...", etc.),
  use this template. Before calling `cs sandbox create`, you MUST:

  1. Prompt the user for the GitHub repository to watch, then rewrite the
     `system.files` content block that creates `~/pr-watcher/watch-target.txt`
     so its first non-comment line is either:
       - owner/repo
       - https://github.com/owner/repo
     Accept either format from the user and write the file for them — do
     not make the user split the repo into separate fields.

  2. Assume the current Crafting org already has GitHub App access to the
     target repo, including at least `Pull requests: Read` permission.
     This template uses the org-shared GitHub App identity, so do NOT ask
     the user to confirm app setup or provide a PAT or other personal
     GitHub secret.

  3. Create the sandbox:
         cs sandbox create <name> \
             --from def:sandbox.yaml

  4. Replace `scripts/on-new-pr.sh` with the real per-PR action the user
     actually asked for. The placeholder in this template only prints —
     it is NOT the finished automation.

workspaces:
  - name: pr-watcher
    system:
      files:
        - path: ~/pr-watcher/watch-target.txt
          mode: "0644"
          content: |
            # Replace the first non-comment line with the GitHub repo to watch.
            # Accepted formats:
            #   owner/repo
            #   https://github.com/owner/repo
            REPLACE_ME/REPLACE_ME
    # base_snapshot intentionally omitted: the org's default_base_image
    # (or the cluster default) is used. All stock Crafting shared workspace
    # bases are Debian-family, so the `build` hook's apt-get flow works.
    checkouts:
      - path: pr-watcher
        repo:
          git: https://github.com/crafting-demo/pr-watcher-automation
        version_spec: master
        history:
          depth: 1
        manifest:
          overlays:
            - inline:
                hooks:
                  post-checkout:
                    cmd: |
                      set -euo pipefail
                      watcher_home="${HOME}/pr-watcher"
                      state_file="${watcher_home}/state/seen-prs.txt"
                      mkdir -p "${watcher_home}/state" "${watcher_home}/logs"
                      touch "${state_file}"
                      cp -f scripts/watch-prs.sh "${watcher_home}/watch-prs.sh"
                      cp -f scripts/on-new-pr.sh "${watcher_home}/on-new-pr.sh"
                      chmod +x "${watcher_home}/watch-prs.sh" "${watcher_home}/on-new-pr.sh"
                  build:
                    cmd: |
                      set -euo pipefail
                      if ! command -v gh >/dev/null 2>&1; then
                        sudo install -m 0755 -d /etc/apt/keyrings
                        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                          | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
                        sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
                        arch="$(dpkg --print-architecture)"
                        echo "deb [arch=${arch} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                          | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
                        sudo apt-get update -qq
                        sudo apt-get install -y -qq --no-install-recommends gh ca-certificates
                      fi
                jobs:
                  watch-prs:
                    run:
                      cmd: |
                        "${HOME}/pr-watcher/watch-prs.sh" \
                          >> "${HOME}/pr-watcher/logs/watch-prs.log" 2>&1
                    schedule: "*/5 * * * *"
                    disable_on_start: false
